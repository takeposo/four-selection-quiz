<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>四択クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 初期化中画面 -->
    <div id="loadingScreen" class="screen active">
      <h1>四択クイズ</h1>
      <p>クイズを読み込んでいます...</p>
    </div>

    <!-- エラー画面 -->
    <div id="errorScreen" class="screen">
      <h1>エラーが発生しました</h1>
      <p id="errorMessage"></p>
      <button onclick="location.reload()">リロード</button>
    </div>

    <!-- 難易度選択画面 -->
    <div id="difficultyScreen" class="screen">
      <h1>四択クイズ</h1>
      <p>難易度を選んでください</p>
      <div class="difficulty-buttons">
        <button id="easyBtn" class="difficulty-btn" onclick="selectDifficulty('易しい')" disabled>易しい</button>
        <button id="normalBtn" class="difficulty-btn" onclick="selectDifficulty('普通')" disabled>普通</button>
        <button id="hardBtn" class="difficulty-btn" onclick="selectDifficulty('難しい')" disabled>難しい</button>
      </div>
      <div class="stats">
        <p>残りクイズ数: 易しい <span id="easyCount">0</span> 問、普通 <span id="normalCount">0</span> 問、難しい <span id="hardCount">0</span> 問</p>
      </div>
      <div class="controls">
        <button id="listSelectBtn" class="secondary-btn" onclick="openQuizListModal()">問題一覧から選ぶ</button>
        <button id="resetBtn" class="reset-btn" onclick="resetQuizzes()">リセット</button>
      </div>
    </div>

    <div id="quizListModal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="quizListModalTitle">
      <div class="modal">
        <div class="modal-header">
          <h2 id="quizListModalTitle">問題一覧から選ぶ</h2>
          <button class="modal-close" onclick="closeQuizListModal()" aria-label="閉じる">×</button>
        </div>
        <div class="modal-body">
          <label class="modal-field">
            <span>選び方</span>
            <select id="quizListModeSelect" onchange="onQuizListModeChange()">
              <option value="all">全問題から選ぶ</option>
              <option value="difficulty">難易度毎の一覧から選ぶ</option>
            </select>
          </label>
          <label id="quizListDifficultyField" class="modal-field hidden">
            <span>難易度</span>
            <select id="quizListDifficultySelect" onchange="onQuizListDifficultyChange()">
              <option value="易しい">易しい</option>
              <option value="普通">普通</option>
              <option value="難しい">難しい</option>
            </select>
          </label>
          <div id="quizListContainer" class="quiz-list"></div>
          <div class="quiz-list-pagination">
            <button id="quizListPrevBtn" onclick="changeQuizListPage(-1)">前へ</button>
            <span id="quizListPageInfo"></span>
            <button id="quizListNextBtn" onclick="changeQuizListPage(1)">次へ</button>
          </div>
          <div class="modal-actions">
            <button id="confirmQuizListBtn" class="btn-check" onclick="selectQuizFromList()">選択</button>
          </div>
        </div>
      </div>
    </div>

    <!-- クイズ表示画面 -->
    <div id="quizScreen" class="screen">
      <div class="quiz-header">
        <span class="difficulty" id="quizDifficulty"></span>
        <span id="quizId"></span>
      </div>
      
      <h2 id="question" class="question"></h2>

      <div class="options" id="optionsContainer">
        <!-- オプションボタンがここに動的に生成されます -->
      </div>

      <div id="answerSection" class="answer-section hidden">
        <div class="correct-answer">
          <p>正解: <span id="correctAnswerDisplay"></span></p>
        </div>
        <div class="explanation">
          <p><strong>解説:</strong></p>
          <p id="explanationText"></p>
        </div>
        <button class="btn-next" onclick="nextQuestion()">次へ</button>
      </div>

      <div id="quizButtonSection" class="quiz-button-section">
        <button class="btn-check" onclick="showAnswer()">正解は？</button>
      </div>
    </div>

    <!-- 終了画面 -->
    <div id="finishScreen" class="screen">
      <h1>クイズ終了</h1>
      <p>クイズは全て終了しました。</p>
      <p>お疲れ様でした！</p>
      <button onclick="location.reload()">もう一度やる</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
